services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_v2
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempo -d ai_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  secrets:
    build: .
    command: ["/app/.venv/bin/uvicorn", "secret_manager.app:app", "--host", "0.0.0.0", "--port", "8100"]
    environment:
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
      OP_VAULT: Paradigm AI Secrets & API Keys
    networks:
      - secrets_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  firewall:
    build: services/firewall
    environment:
      SECRET_MANAGER_URL: http://secrets:8100
    networks:
      - default
      - secrets_net
      - agent_net
    volumes:
      - firewall-certs:/certs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      secrets:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://tempo:tempo_dev@postgres:5432/ai_v2
      SLACKBOT_URL: http://slackbot:3001
      AI_V2_LOG_LEVEL: info
      SECRET_MANAGER_URL: http://secrets:8100
      FIREWALL_HOST: firewall
      AGENT_NETWORK: ai_v2_agent_net
      FIREWALL_CERTS_VOLUME: firewall-certs
    networks:
      - default
      - secrets_net
      - agent_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./tools:/app/tools
      - firewall-certs:/firewall-certs:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      secrets:
        condition: service_started
      firewall:
        condition: service_healthy
    restart: unless-stopped

  etl:
    build: .
    command: ["/app/.venv/bin/ai-v2", "continuous"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://tempo:tempo_dev@postgres:5432/ai_v2
      SECRET_MANAGER_URL: http://secrets:8100
    networks:
      - default
      - secrets_net
    depends_on:
      postgres:
        condition: service_healthy
      secrets:
        condition: service_started
    restart: unless-stopped

  slackbot:
    build:
      context: apps/slackbot
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
      AI_V2_API_URL: http://api:8000
      AI_V2_API_KEY: ${API_SECRET_KEY}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  auth:
    build: services/auth
    environment:
      SECRET_MANAGER_URL: http://secrets:8100
    networks:
      - default
      - secrets_net
    depends_on:
      secrets:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - api
      - slackbot
      - grafana
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SERVER_ROOT_URL: https://svc-ai.paradigm.xyz/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-Forwarded-User
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  pgdata:
    external: true
    name: ai_v2_pgdata
  redisdata:
  grafanadata:
    external: true
    name: ai_v2_grafanadata
  prometheusdata:
    external: true
    name: ai_v2_prometheusdata
  lokidata:
    external: true
    name: ai_v2_lokidata
  firewall-certs:
    external: true
    name: ai_v2_firewall-certs

networks:
  secrets_net:
    internal: true
  agent_net:
    internal: true
