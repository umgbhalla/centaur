name: centaur

services:
  postgres:
    image: pgvector/pgvector:pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    environment:
      POSTGRES_DB: ai_v2
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: TAq2YL3JO2mdA5jDeTYNoPeWhTw87Gg
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempo -d ai_v2"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
      start_interval: 1s


  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      POST: 1
      EXEC: 1
      LOG: 1
      IMAGES: 0
      VOLUMES: 0
    networks:
      - default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/version"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
      start_interval: 1s
    restart: unless-stopped

  # ⚠️  NEVER manually recreate this container — it requires OP_SERVICE_ACCOUNT_TOKEN
  # which is only injected by CI (GitHub Actions).  Manual `docker compose up -d secrets`
  # will start it without the token, breaking all secret resolution.
  # To redeploy: gh workflow run deploy.yml --repo <owner/repo>
  secrets:
    build:
      context: .
      dockerfile: services/secrets/Dockerfile
    environment:
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
      OP_VAULT: ${OP_VAULT:-}
    networks:
      - secrets_net
      - secrets_egress
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
      start_interval: 2s
    restart: unless-stopped

  firewall:
    build:
      context: .
      dockerfile: services/firewall/Dockerfile
    environment:
      SECRET_MANAGER_URL: http://secrets:8100
      FIREWALL_CONTROL_TOKEN: ${FIREWALL_CONTROL_TOKEN:?FIREWALL_CONTROL_TOKEN must be set — generate with `openssl rand -hex 32` and store in the deployer env or GitHub Actions secrets}

    networks:
      - default
      - secrets_net
      - agent_net
      - agent_egress
      - control_net
    volumes:
      - firewall-certs:/certs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
      start_interval: 1s
    depends_on:
      secrets:
        condition: service_healthy
    restart: unless-stopped

  pgbouncer:
    build:
      context: .
      dockerfile: services/pgbouncer/Dockerfile
    environment:
      SECRET_MANAGER_URL: http://firewall:8081
      FIREWALL_CONTROL_TOKEN: ${FIREWALL_CONTROL_TOKEN:?FIREWALL_CONTROL_TOKEN must be set — generate with `openssl rand -hex 32` and store in the deployer env or GitHub Actions secrets}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
    networks:
      - control_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      firewall:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "tempo"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
      start_interval: 1s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      SECRET_MANAGER_URL: http://firewall:8081
      FIREWALL_CONTROL_TOKEN: ${FIREWALL_CONTROL_TOKEN:?FIREWALL_CONTROL_TOKEN must be set — generate with `openssl rand -hex 32` and store in the deployer env or GitHub Actions secrets}
      SLACKBOT_URL: http://slackbot:3001
      CENTAUR_LOG_LEVEL: info
      LOCAL_DEV_API_KEY: ${LOCAL_DEV_API_KEY:-}
      CENTAUR_OVERLAY_HOST_DIR: ${CENTAUR_OVERLAY_HOST_DIR:-${HOME}/centaur-overlay}
      CENTAUR_OVERLAY_DIR: /app/overlay/org
      TOOL_DIRS: /app/tools:/app/overlay/org/tools
      WORKFLOW_DIRS: /app/workflows:/app/overlay/org/workflows
      REPOS_HOST_DIR: ${HOME}/github
      REPO_HOST_DIR: ${PWD}
      FIREWALL_HOST: firewall
      AGENT_NETWORK: centaur_agent_net
      AGENT_EGRESS_NETWORK: centaur_agent_egress
      FIREWALL_CERTS_VOLUME: centaur_firewall-certs
      EXECUTION_WORKER_CONCURRENCY: "16"
      WORKFLOW_WORKER_CONCURRENCY: "8"
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      HTTPS_PROXY: http://firewall:8080
      BROWSER_USE_PROFILE_ID: ${BROWSER_USE_PROFILE_ID:-}
      REQUESTS_CA_BUNDLE: /firewall-certs/ca-cert.pem
      SSL_CERT_FILE: /firewall-certs/ca-cert.pem
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - agent_net
      - backend_net
      - control_net
    volumes:
      - ./tools:/app/tools
      - ./workflows:/app/workflows
      - ${CENTAUR_OVERLAY_HOST_DIR:-${HOME}/centaur-overlay}:/app/overlay/org
      - firewall-certs:/firewall-certs:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
      start_interval: 2s
    depends_on:
      pgbouncer:
        condition: service_healthy
      firewall:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
    ports:
      - "${CENTAUR_NGINX_BIND_ADDRESS:-127.0.0.1}:${CENTAUR_NGINX_HOST_PORT:-8000}:80"
    environment:
      CENTAUR_NGINX_SERVER_NAME: ${CENTAUR_NGINX_SERVER_NAME:-_}
      CENTAUR_NGINX_ENABLED_SERVICES: ${CENTAUR_NGINX_ENABLED_SERVICES:-slackbot,apps}
      CENTAUR_NGINX_SLACKBOT_UPSTREAM: http://slackbot:3001
      CENTAUR_NGINX_API_UPSTREAM: http://api:8000
      CENTAUR_NGINX_ADMIN_UPSTREAM: http://api:8000
      CENTAUR_NGINX_GRAFANA_UPSTREAM: http://grafana:3000
      CENTAUR_NGINX_AUTH_UPSTREAM: ${CENTAUR_NGINX_AUTH_UPSTREAM:-http://auth:3000}
      CENTAUR_NGINX_WEB_UPSTREAM: ${CENTAUR_NGINX_WEB_UPSTREAM:-http://web:3000}
      CENTAUR_NGINX_NEXT_UPSTREAM: ${CENTAUR_NGINX_NEXT_UPSTREAM:-http://next:3000}
      CENTAUR_NGINX_APPS_DOMAIN: ${CENTAUR_NGINX_APPS_DOMAIN:-}
    networks:
      - default
    depends_on:
      slackbot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
      start_interval: 1s
    restart: unless-stopped

  slackbot:
    build:
      context: .
      dockerfile: services/slackbot/Dockerfile
    environment:
      CENTAUR_API_URL: http://api:8000
      SECRET_MANAGER_URL: http://firewall:8081
      FIREWALL_CONTROL_TOKEN: ${FIREWALL_CONTROL_TOKEN:?FIREWALL_CONTROL_TOKEN must be set — generate with `openssl rand -hex 32` and store in the deployer env or GitHub Actions secrets}
      HTTPS_PROXY: http://firewall:8080
      NODE_EXTRA_CA_CERTS: /firewall-certs/ca-cert.pem
      NO_PROXY: localhost,127.0.0.1,postgres,pgbouncer,api,firewall
    volumes:
      - firewall-certs:/firewall-certs:ro
    networks:
      - default
      - backend_net
    depends_on:
      api:
        condition: service_healthy
      firewall:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
      start_interval: 2s
    restart: unless-stopped

  # Build-only target. Not started by `docker compose up` because it is profiled.
  # Build with: docker compose build sandbox
  sandbox:
    build:
      context: .
      dockerfile: services/sandbox/Dockerfile
    image: centaur-agent:latest
    profiles: ["build"]

  grafana:
    image: grafana/grafana:latest@sha256:70d9599b186ce287be0d2c5ba9a78acb2e86c1a68c9c41449454d0fc3eeb84e8
    environment:
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-Forwarded-User
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      victoriametrics:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    networks:
      - default
      - obs_net
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest@sha256:b9b667f6709f20044328ddefae8869c56ced840ebafdf89bc3bba1f28f2d7e60
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=30d
      - -selfScrapeInterval=15s
    volumes:
      - vmdata:/victoria-metrics-data
    networks:
      - default
      - obs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8428/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
      start_interval: 1s
    restart: unless-stopped

  victorialogs:
    image: docker.io/victoriametrics/victoria-logs:latest@sha256:70cadcf591e593456decccb23250765a4a5f2cd62904e2ab181fd4db45428d5e
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=7d
    volumes:
      - vldata:/victoria-logs-data
    networks:
      - default
      - obs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9428/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
      start_interval: 1s
    restart: unless-stopped

  fluentbit:
    build:
      context: services/fluentbit
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      victorialogs:
        condition: service_healthy
    networks:
      - default
      - obs_net
    restart: unless-stopped

volumes:
  pgdata:
    external: true
    name: centaur_pgdata
  grafanadata:
    external: true
    name: centaur_grafanadata
  vmdata:
    external: true
    name: centaur_vmdata
  vldata:
    external: true
    name: centaur_vldata
  firewall-certs:
    external: true
    name: centaur_firewall-certs

networks:
  secrets_net:
    internal: true
  secrets_egress:
    # Non-internal: gives the secret manager outbound internet access
    # for 1Password SDK calls. Only the secrets container uses this.
  agent_net:
    internal: true
  agent_egress:
    # Non-internal: gives spawned sandboxes DNS + direct egress for Amp's DTW
    # WebSocket transport while keeping HTTP requests on the firewall proxy.
  backend_net:
    internal: true
  obs_net:
    internal: true
  control_net:
    internal: true
