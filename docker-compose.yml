services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_v2
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempo -d ai_v2"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
      start_interval: 1s


  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      POST: 1
      EXEC: 1
      LOG: 1
      IMAGES: 0
      VOLUMES: 0
    networks:
      - default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/version"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
      start_interval: 1s
    restart: unless-stopped

  # ⚠️  NEVER manually recreate this container — it requires OP_SERVICE_ACCOUNT_TOKEN
  # which is only injected by CI (GitHub Actions).  Manual `docker compose up -d secrets`
  # will start it without the token, breaking all secret resolution.
  # To redeploy: gh workflow run deploy.yml --repo paradigmxyz/ai_v2
  secrets:
    build: .
    entrypoint: []
    command: ["/app/.venv/bin/uvicorn", "secret_manager.app:app", "--host", "0.0.0.0", "--port", "8100"]
    environment:
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
      OP_VAULT: Paradigm AI Secrets & API Keys
      SECRET_MANAGER_TOKEN: ${SECRET_MANAGER_TOKEN:-}
    networks:
      - secrets_net
      - secrets_egress
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
      start_interval: 2s
    restart: unless-stopped

  firewall:
    build:
      context: .
      dockerfile: services/firewall/Dockerfile
    environment:
      SECRET_MANAGER_URL: http://secrets:8100
      SECRET_MANAGER_TOKEN: ${SECRET_MANAGER_TOKEN:-}

    networks:
      - default
      - secrets_net
      - agent_net
      - control_net
    volumes:
      - firewall-certs:/certs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
      start_interval: 1s
    depends_on:
      secrets:
        condition: service_healthy
    restart: unless-stopped

  pgbouncer:
    build:
      context: .
      dockerfile: services/pgbouncer/Dockerfile
    environment:
      SECRET_MANAGER_URL: http://firewall:8081
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
    networks:
      - control_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      firewall:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
      start_interval: 1s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      SECRET_MANAGER_URL: http://firewall:8081
      SLACKBOT_URL: http://slackbot:3001
      AI_V2_LOG_LEVEL: info
      TOOL_DIRS: /app/tools:/app/tools-paradigm
      REPOS_HOST_DIR: ${HOME}/github
      REPO_HOST_DIR: ${PWD}
      FIREWALL_HOST: firewall
      AGENT_NETWORK: ai_v2_agent_net
      FIREWALL_CERTS_VOLUME: ai_v2_firewall-certs
      # paradigmdb: connect to Shift Postgres via host-side SSH tunnel on :54321
      RESHIFT_DB_DSN: ${RESHIFT_DB_DSN:-}
      GOOGLE_APPLICATION_CREDENTIALS: /gcloud/adc.json
      NGINX_TRUSTED_CIDRS: "172.16.0.0/12"
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      HTTPS_PROXY: http://firewall:8080
      HTTP_PROXY: http://firewall:8080
      REQUESTS_CA_BUNDLE: /firewall-certs/ca-cert.pem
      SSL_CERT_FILE: /firewall-certs/ca-cert.pem
      NO_PROXY: localhost,127.0.0.1,postgres,pgbouncer,slackbot,api,auth,nginx,docker-socket-proxy,secrets,firewall,grafana,prometheus,victorialogs,promtail
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - agent_net
      - backend_net
      - control_net
    volumes:
      - ./tools:/app/tools
      - ./tools-paradigm:/app/tools-paradigm
      - firewall-certs:/firewall-certs:ro
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcloud/adc.json:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
      start_interval: 2s
    depends_on:
      pgbouncer:
        condition: service_healthy
      firewall:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    restart: unless-stopped

  slackbot:
    build:
      context: .
      dockerfile: apps/slackbot/Dockerfile
    environment:
      AI_V2_API_URL: http://api:8000
      SECRET_MANAGER_URL: http://firewall:8081
      HTTPS_PROXY: http://firewall:8080
      NODE_EXTRA_CA_CERTS: /firewall-certs/ca-cert.pem
      NO_PROXY: localhost,127.0.0.1,postgres,pgbouncer,api,auth,nginx,firewall
    volumes:
      - firewall-certs:/firewall-certs:ro
    networks:
      - default
      - backend_net
      - agent_net
    depends_on:
      api:
        condition: service_healthy
      firewall:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      AI_V2_API_URL: http://api:8000
      SECRET_MANAGER_URL: http://firewall:8081
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - default
      - backend_net
    depends_on:
      api:
        condition: service_healthy
      firewall:
        condition: service_healthy
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      SECRET_MANAGER_URL: http://firewall:8081
    networks:
      - default
    depends_on:
      firewall:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - api
      - slackbot
      - web
      - grafana
    networks:
      - default
      - obs_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SERVER_ROOT_URL: https://svc-ai.paradigm.xyz/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-Forwarded-User
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    networks:
      - default
      - obs_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    networks:
      - default
      - obs_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
      start_interval: 1s
    restart: unless-stopped

  victorialogs:
    image: docker.io/victoriametrics/victoria-logs:latest
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=7d
    volumes:
      - vldata:/victoria-logs-data
    networks:
      - default
      - obs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9428/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
      start_interval: 1s
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      victorialogs:
        condition: service_healthy
    networks:
      - default
      - obs_net
    restart: unless-stopped

volumes:
  pgdata:
    external: true
    name: ai_v2_pgdata
  grafanadata:
    external: true
    name: ai_v2_grafanadata
  prometheusdata:
    external: true
    name: ai_v2_prometheusdata
  vldata:
    external: true
    name: ai_v2_vldata
  firewall-certs:
    external: true
    name: ai_v2_firewall-certs

networks:
  secrets_net:
    internal: true
  secrets_egress:
    # Non-internal: gives the secret manager outbound internet access
    # for 1Password SDK calls. Only the secrets container uses this.
  agent_net:
    internal: true
  backend_net:
    internal: true
  obs_net:
    internal: true
  control_net:
    internal: true
