nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []

secretManager:
  backend: onepassword
  envPrefix: ""
  existingSecretName: centaur-infra-env

firewall:
  existingCaSecretName: centaur-firewall-ca
  existingCaKeySecretName: centaur-firewall-ca-key
  ca:
    certPem: ""
    keyPem: ""

ironProxy:
  image:
    repository: centaur-iron-proxy
    tag: latest
    pullPolicy: IfNotPresent
  service:
    proxyPort: 8080
    managementPort: 9092
    healthPort: 9090
  manager:
    image:
      repository: centaur-firewall-manager
      tag: latest
      pullPolicy: IfNotPresent
    service:
      controlPort: 8081
    secretSource: onepassword
    secretTtl: 10m
  extraEnv: {}

secrets:
  image:
    repository: centaur-secrets
    tag: latest
    pullPolicy: IfNotPresent
  bootstrapSecretName: ""
  extraEnv: {}

api:
  replicaCount: 1
  image:
    repository: centaur-api
    tag: latest
    pullPolicy: IfNotPresent
  executionWorkerEnabled: false
  workflowWorkerEnabled: true
  warmPoolEnabled: false
  slackEtlEnabled: true
  slackSyncIntervalSeconds: 14400
  victoriaMetricsPushEnabled: false
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    failureThreshold: 6
    periodSeconds: 10
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 6
    periodSeconds: 10
    timeoutSeconds: 5
  egressDiscovery:
    enabled: true
    namespace: centaur-egress
    clusterDomain: cluster.local
    tailnetFqdnAnnotation: tailscale.com/tailnet-fqdn
  extraEnv: {}
  resources: {}

overlay:
  mountPath: /app/overlay/org
  systemPrompt: ""
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
    sourcePath: /overlay

sandbox:
  image:
    repository: centaur-agent
    tag: latest
    pullPolicy: IfNotPresent
  perWorkloadProxy:
    pollIntervalSeconds: 30
    pollJitterSeconds: 10
    startupBackoffInitialSeconds: 0.5
    startupBackoffMaxSeconds: 5
  runtimeClassName: ""
  reposPath: ""
  extraEnv: {}
  resources:
    limits: {}
    requests:
      cpu: 100m
      memory: 512Mi

repoCache:
  enabled: false
  hostPath: /var/lib/centaur/repos
  repositories: []
  syncIntervalSeconds: 300
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  githubToken:
    existingSecretName: ""
    secretKey: token
    token: ""
  egressPorts:
    - 443
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

slackbot:
  enabled: true
  replicaCount: 1
  image:
    repository: centaur-slackbot
    tag: latest
    pullPolicy: IfNotPresent
  runtimeErrorAlertChannel: ""
  extraEnv: {}
  resources: {}

pgbouncer:
  image:
    repository: centaur-pgbouncer
    tag: latest
    pullPolicy: IfNotPresent
  authType: scram-sha-256
  poolMode: transaction
  maxClientConn: 200
  defaultPoolSize: 25
  resources: {}

postgres:
  enabled: true
  image:
    repository: paradedb/paradedb
    tag: 0.23.0-pg16
    pullPolicy: IfNotPresent
  args:
    - "-c"
    - "shared_preload_libraries=pg_search,pg_cron"
  auth:
    database: ai_v2
    username: tempo
    password: tempo_dev_change_me
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""
  resources: {}

database:
  appUrl: ""
  pgbouncerUrl: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: centaur.local
  tls: []

httpRoutes: []

runnerAccess:
  enabled: false
  allowedCidrs: []
  apiService:
    type: LoadBalancer
    loadBalancerSourceRanges: []
  proxyService:
    type: LoadBalancer
    loadBalancerSourceRanges: []

networkPolicy:
  enabled: true
  ingressSourceNamespaces: []
  apiIngressSourceNamespaces: []
  ingressControllerNamespaces:
    - kube-system

podSecurityContext:
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
