{{- if .Values.secretManager.generatedSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "centaur.secretEnvName" . }}
  labels:
{{ include "centaur.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ printf "%sDATABASE_URL" .Values.secretManager.envPrefix }}: {{ include "centaur.appDatabaseUrl" . | quote }}
  {{ printf "%sPGBOUNCER_DATABASE_URL" .Values.secretManager.envPrefix }}: {{ include "centaur.pgbouncerDatabaseUrl" . | quote }}
  {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}: {{ required "secretManager.secrets.firewallControlToken is required" .Values.secretManager.secrets.firewallControlToken | quote }}
  {{ printf "%sSANDBOX_SIGNING_KEY" .Values.secretManager.envPrefix }}: {{ required "secretManager.secrets.sandboxSigningKey is required" .Values.secretManager.secrets.sandboxSigningKey | quote }}
  {{ printf "%sFIREWALL_CA_CERT" .Values.secretManager.envPrefix }}: |-
{{ required "firewall.ca.certPem is required" .Values.firewall.ca.certPem | nindent 4 }}
  {{ printf "%sFIREWALL_CA_KEY" .Values.secretManager.envPrefix }}: |-
{{ required "firewall.ca.keyPem is required" .Values.firewall.ca.keyPem | nindent 4 }}
  {{ printf "%sLOCAL_DEV_API_KEY" .Values.secretManager.envPrefix }}: {{ .Values.secretManager.secrets.localDevApiKey | quote }}
{{- if .Values.slackbot.enabled }}
  {{ printf "%sSLACK_BOT_TOKEN" .Values.secretManager.envPrefix }}: {{ required "secretManager.secrets.slackBotToken is required when slackbot.enabled=true" .Values.secretManager.secrets.slackBotToken | quote }}
  {{ printf "%sSLACK_SIGNING_SECRET" .Values.secretManager.envPrefix }}: {{ required "secretManager.secrets.slackSigningSecret is required when slackbot.enabled=true" .Values.secretManager.secrets.slackSigningSecret | quote }}
  {{ printf "%sSLACKBOT_API_KEY" .Values.secretManager.envPrefix }}: {{ required "secretManager.secrets.slackbotApiKey is required when slackbot.enabled=true" .Values.secretManager.secrets.slackbotApiKey | quote }}
{{- else }}
  {{ printf "%sSLACK_SIGNING_SECRET" .Values.secretManager.envPrefix }}: {{ .Values.secretManager.secrets.slackSigningSecret | quote }}
{{- end }}
{{- range $key, $value := .Values.secretManager.extraSecrets }}
  {{ printf "%s%s" $.Values.secretManager.envPrefix $key }}: |-
{{ $value | indent 4 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "centaur.trustedCaSecretName" . }}
  labels:
{{ include "centaur.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca-cert.pem: |-
{{ required "firewall.ca.certPem is required" .Values.firewall.ca.certPem | nindent 4 }}
{{- end }}
