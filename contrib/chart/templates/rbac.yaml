{{- if eq .Values.api.sandboxBackend "kubernetes" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "centaur.apiServiceAccountName" . }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-sandbox-manager") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/attach", "pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-sandbox-manager") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "centaur.apiServiceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-sandbox-manager") }}
{{- if .Values.api.egressDiscovery.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-egress-discovery") }}
  namespace: {{ .Values.api.egressDiscovery.namespace | quote }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-egress-discovery") }}
  namespace: {{ .Values.api.egressDiscovery.namespace | quote }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "centaur.apiServiceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "centaur.componentName" (dict "root" . "component" "api-egress-discovery") }}
{{- end }}
{{- end }}
