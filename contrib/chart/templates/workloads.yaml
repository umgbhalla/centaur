{{- $reposPath := .Values.sandbox.reposPath -}}
{{- $apiExtraEnv := .Values.api.extraEnv | default dict -}}
{{- if and .Values.repoCache.enabled (not $reposPath) -}}
{{- $reposPath = .Values.repoCache.hostPath -}}
{{- end -}}
{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
{{- with .Values.postgres.args }}
          args:
{{ toYaml . | nindent 12 }}
{{- end }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
{{- if .Values.postgres.auth.existingSecretName }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "postgres.auth.existingSecretName is required when postgres.enabled=true" .Values.postgres.auth.existingSecretName | quote }}
                  key: {{ required "postgres.auth.existingSecretKey is required when postgres.enabled=true" .Values.postgres.auth.existingSecretKey | quote }}
{{- end }}
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 5432
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 5432
            timeoutSeconds: 1
          resources:
{{ toYaml .Values.postgres.resources | nindent 12 }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
        volumeMode: Filesystem
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "firewallCa" .Values.firewall.ca) | sha256sum }}
        checksum/firewall-ca: {{ toJson .Values.firewall.ca | sha256sum }}
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
        checksum/overlay: {{ toJson .Values.overlay | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      automountServiceAccountToken: true
      serviceAccountName: {{ include "centaur.apiServiceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.overlay.image.repository }}
      initContainers:
        - name: overlay-bootstrap
          image: {{ printf "%s:%s" .Values.overlay.image.repository .Values.overlay.image.tag | quote }}
          imagePullPolicy: {{ .Values.overlay.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              src={{ .Values.overlay.image.sourcePath | quote }}
              target={{ .Values.overlay.mountPath | quote }}
              mkdir -p "$target"
              cp -R "$src"/. "$target"/
          volumeMounts:
            - name: overlay-root
              mountPath: {{ dir .Values.overlay.mountPath | quote }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
{{- end }}
      containers:
        - name: api
          image: {{ printf "%s:%s" .Values.api.image.repository .Values.api.image.tag | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sDATABASE_URL" .Values.secretManager.envPrefix }}
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACK_SIGNING_SECRET" .Values.secretManager.envPrefix }}
            - name: SLACKBOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACKBOT_API_KEY" .Values.secretManager.envPrefix }}
            - name: SANDBOX_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSANDBOX_SIGNING_KEY" .Values.secretManager.envPrefix }}
            - name: LMNR_PROJECT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sLMNR_PROJECT_API_KEY" .Values.secretManager.envPrefix }}
                  optional: true
            - name: LMNR_BASE_URL
{{- if .Values.laminar.enabled }}
              value: {{ include "centaur.laminarBaseUrl" . | quote }}
{{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sLMNR_BASE_URL" .Values.secretManager.envPrefix }}
                  optional: true
{{- end }}
            - name: LMNR_HTTP_PORT
              value: {{ .Values.laminar.appServer.service.httpPort | quote }}
            - name: LMNR_GRPC_PORT
              value: {{ .Values.laminar.appServer.service.grpcPort | quote }}
            - name: HTTPS_PROXY
              value: {{ include "centaur.firewallProxyUrl" . | quote }}
            - name: REQUESTS_CA_BUNDLE
              value: /firewall-certs/ca-cert.pem
            - name: SSL_CERT_FILE
              value: /firewall-certs/ca-cert.pem
            - name: NO_PROXY
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s,%s%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "slackbot")) (include "centaur.firewallNoProxyHosts" .) (include "centaur.laminarNoProxyHosts" .) | quote }}
            - name: no_proxy
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s,%s%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "slackbot")) (include "centaur.firewallNoProxyHosts" .) (include "centaur.laminarNoProxyHosts" .) | quote }}
            - name: CENTAUR_LOG_LEVEL
              value: info
            - name: TOOL_DIRS
{{- if .Values.overlay.image.repository }}
              value: {{ printf "/app/tools:%s/tools" .Values.overlay.mountPath | quote }}
{{- else }}
              value: /app/tools
{{- end }}
            - name: WORKFLOW_DIRS
{{- if .Values.overlay.image.repository }}
              value: {{ printf "/app/workflows:%s/workflows" .Values.overlay.mountPath | quote }}
{{- else }}
              value: /app/workflows
{{- end }}
{{- if or .Values.overlay.systemPrompt .Values.overlay.image.repository }}
            - name: CENTAUR_OVERLAY_DIR
              value: {{ .Values.overlay.mountPath | quote }}
{{- end }}
{{- if .Values.overlay.image.repository }}
            - name: CENTAUR_OVERLAY_IMAGE
              value: {{ printf "%s:%s" .Values.overlay.image.repository .Values.overlay.image.tag | quote }}
            - name: CENTAUR_OVERLAY_IMAGE_PULL_POLICY
              value: {{ .Values.overlay.image.pullPolicy | quote }}
            - name: CENTAUR_OVERLAY_IMAGE_SOURCE_PATH
              value: {{ .Values.overlay.image.sourcePath | quote }}
{{- end }}
            - name: AGENT_API_URL
              value: {{ printf "http://%s:8000" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: FIREWALL_HOST
              value: {{ include "centaur.firewallProxyHost" . | quote }}
            - name: KUBERNETES_EGRESS_DISCOVERY_ENABLED
              value: {{ ternary "1" "0" .Values.api.egressDiscovery.enabled | quote }}
            - name: KUBERNETES_EGRESS_SERVICE_NAMESPACE
              value: {{ .Values.api.egressDiscovery.namespace | quote }}
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ .Values.api.egressDiscovery.clusterDomain | quote }}
            - name: KUBERNETES_EGRESS_TAILNET_FQDN_ANNOTATION
              value: {{ .Values.api.egressDiscovery.tailnetFqdnAnnotation | quote }}
            - name: EXECUTION_WORKER_ENABLED
              value: {{ ternary "1" "0" .Values.api.executionWorkerEnabled | quote }}
            - name: WORKFLOW_WORKER_ENABLED
              value: {{ ternary "1" "0" .Values.api.workflowWorkerEnabled | quote }}
            - name: WARM_POOL_ENABLED
              value: {{ ternary "1" "0" .Values.api.warmPoolEnabled | quote }}
{{- if not (hasKey $apiExtraEnv "SLACK_ETL_ENABLED") }}
            - name: SLACK_ETL_ENABLED
              value: {{ ternary "1" "0" .Values.api.slackEtlEnabled | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "SLACK_SYNC_INTERVAL_SECONDS") }}
            - name: SLACK_SYNC_INTERVAL_SECONDS
              value: {{ .Values.api.slackSyncIntervalSeconds | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "SLACK_BACKFILL_INTERVAL_SECONDS") }}
            - name: SLACK_BACKFILL_INTERVAL_SECONDS
              value: {{ .Values.api.slackBackfillIntervalSeconds | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "SLACK_BACKFILL_CHANNEL_BATCH_LIMIT") }}
            - name: SLACK_BACKFILL_CHANNEL_BATCH_LIMIT
              value: {{ .Values.api.slackBackfillChannelBatchLimit | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "SLACK_SYNC_BACKFILL_LOOKBACK_DAYS") }}
            - name: SLACK_SYNC_BACKFILL_LOOKBACK_DAYS
              value: {{ .Values.api.slackSyncBackfillLookbackDays | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "SLACK_SYNC_THREAD_LOOKBACK_DAYS") }}
            - name: SLACK_SYNC_THREAD_LOOKBACK_DAYS
              value: {{ .Values.api.slackSyncThreadLookbackDays | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "COMPANY_CONTEXT_DOCUMENTS_INTERVAL_SECONDS") }}
            - name: COMPANY_CONTEXT_DOCUMENTS_INTERVAL_SECONDS
              value: {{ .Values.api.companyContextDocumentsIntervalSeconds | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "SLACK_ETL_EXCLUDED_CHANNEL_PATTERNS") }}
            - name: SLACK_ETL_EXCLUDED_CHANNEL_PATTERNS
              value: {{ .Values.api.slackEtlExcludedChannelPatterns | quote }}
{{- end }}
            - name: AGENT_IMAGE
              value: {{ printf "%s:%s" .Values.sandbox.image.repository .Values.sandbox.image.tag | quote }}
            - name: KUBERNETES_AGENT_IMAGE_PULL_POLICY
              value: {{ .Values.sandbox.image.pullPolicy | quote }}
            - name: KUBERNETES_FIREWALL_CA_SECRET_NAME
              value: {{ include "centaur.trustedCaSecretName" . | quote }}
            - name: KUBERNETES_FIREWALL_CA_KEY_SECRET_NAME
              value: {{ include "centaur.trustedCaKeySecretName" . | quote }}
            - name: KUBERNETES_SECRET_ENV_NAME
              value: {{ include "centaur.secretEnvName" . | quote }}
            - name: KUBERNETES_SECRET_ENV_PREFIX
              value: {{ .Values.secretManager.envPrefix | quote }}
{{- if .Values.secrets.bootstrapSecretName }}
            - name: KUBERNETES_BOOTSTRAP_SECRET_NAME
              value: {{ .Values.secrets.bootstrapSecretName | quote }}
{{- end }}
            - name: KUBERNETES_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: KUBERNETES_IRON_PROXY_IMAGE
              value: {{ printf "%s:%s" .Values.ironProxy.image.repository .Values.ironProxy.image.tag | quote }}
            - name: KUBERNETES_IRON_PROXY_IMAGE_PULL_POLICY
              value: {{ .Values.ironProxy.image.pullPolicy | quote }}
            - name: KUBERNETES_IRON_PROXY_PORT
              value: {{ .Values.ironProxy.service.proxyPort | quote }}
            - name: KUBERNETES_IRON_PROXY_MANAGEMENT_PORT
              value: {{ .Values.ironProxy.service.managementPort | quote }}
            - name: KUBERNETES_IRON_PROXY_HEALTH_PORT
              value: {{ .Values.ironProxy.service.healthPort | quote }}
            - name: FIREWALL_MANAGER_SECRET_SOURCE
              value: {{ .Values.ironProxy.secretSource | quote }}
            - name: FIREWALL_MANAGER_SECRET_TTL
              value: {{ .Values.ironProxy.secretTtl | quote }}
{{- if eq .Values.ironProxy.secretSource "onepassword-connect" }}
            - name: KUBERNETES_OP_CONNECT_HOST
              value: {{ include "centaur.onepasswordConnectUrl" . | quote }}
{{- end }}
            - name: KUBERNETES_FIREWALL_MANAGER_SECRET_SOURCE
              value: {{ .Values.ironProxy.secretSource | quote }}
            - name: KUBERNETES_API_POD_LABEL_SELECTOR
              value: {{ printf "app.kubernetes.io/name=%s,app.kubernetes.io/instance=%s,app.kubernetes.io/component=api" (include "centaur.name" .) .Release.Name | quote }}
{{- with .Values.sandbox.resources.limits }}
{{- if and .cpu (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_CPU_LIMIT")) }}
            - name: KUBERNETES_SANDBOX_CPU_LIMIT
              value: {{ .cpu | quote }}
{{- end }}
{{- if and .memory (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_MEMORY_LIMIT")) }}
            - name: KUBERNETES_SANDBOX_MEMORY_LIMIT
              value: {{ .memory | quote }}
{{- end }}
{{- end }}
{{- with .Values.sandbox.resources.requests }}
{{- if and .cpu (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_CPU_REQUEST")) }}
            - name: KUBERNETES_SANDBOX_CPU_REQUEST
              value: {{ .cpu | quote }}
{{- end }}
{{- if and .memory (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_MEMORY_REQUEST")) }}
            - name: KUBERNETES_SANDBOX_MEMORY_REQUEST
              value: {{ .memory | quote }}
{{- end }}
{{- end }}
{{- if .Values.sandbox.runtimeClassName }}
            - name: KUBERNETES_SANDBOX_RUNTIME_CLASS_NAME
              value: {{ .Values.sandbox.runtimeClassName | quote }}
{{- end }}
{{- if $reposPath }}
            - name: REPOS_PATH
              value: {{ $reposPath | quote }}
{{- end }}
{{- with .Values.sandbox.extraEnv }}
{{- $envList := list }}
{{- range $k, $v := . }}
{{- $envList = append $envList (dict "name" $k "value" ($v | toString)) }}
{{- end }}
            - name: KUBERNETES_SANDBOX_EXTRA_ENV
              value: {{ $envList | toJson | quote }}
{{- end }}
{{- if .Values.global.imagePullSecrets }}
            - name: KUBERNETES_SANDBOX_IMAGE_PULL_SECRETS
              value: "{{- range $index, $secret := .Values.global.imagePullSecrets }}{{- if $index }},{{ end -}}{{ $secret.name }}{{- end }}"
{{- end }}
            - name: VICTORIAMETRICS_PUSH_ENABLED
              value: {{ ternary "1" "0" .Values.api.victoriaMetricsPushEnabled | quote }}
{{- if .Values.slackbot.enabled }}
            - name: SLACKBOT_URL
              value: {{ printf "http://%s:3001" (include "centaur.componentName" (dict "root" . "component" "slackbot")) | quote }}
{{- end }}
{{- range $name, $value := .Values.api.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          envFrom:
            - secretRef:
                name: {{ include "centaur.secretEnvName" . }}
{{- if and (eq .Values.ironProxy.secretSource "onepassword") .Values.secrets.bootstrapSecretName }}
            - secretRef:
                name: {{ .Values.secrets.bootstrapSecretName | quote }}
{{- end }}
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: {{ .Values.api.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.startupProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
          volumeMounts:
            - name: firewall-ca
              mountPath: /firewall-certs
              readOnly: true
{{- if .Values.overlay.image.repository }}
            - name: overlay-root
              mountPath: {{ dir .Values.overlay.mountPath | quote }}
              readOnly: true
{{- else if .Values.overlay.systemPrompt }}
            - name: overlay
              mountPath: {{ .Values.overlay.mountPath | quote }}
              readOnly: true
{{- end }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: firewall-ca
          secret:
            secretName: {{ include "centaur.trustedCaSecretName" . }}
{{- if .Values.overlay.image.repository }}
        - name: overlay-root
          emptyDir: {}
{{- else if .Values.overlay.systemPrompt }}
        - name: overlay
          configMap:
            name: {{ include "centaur.componentName" (dict "root" . "component" "overlay") }}
            items:
              - key: SYSTEM_PROMPT.md
                path: services/sandbox/SYSTEM_PROMPT.md
{{- end }}
---
{{- if .Values.slackbot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
spec:
  replicas: {{ .Values.slackbot.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "firewallCa" .Values.firewall.ca) | sha256sum }}
        checksum/firewall-ca: {{ toJson .Values.firewall.ca | sha256sum }}
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: slackbot
          image: {{ printf "%s:%s" .Values.slackbot.image.repository .Values.slackbot.image.tag | quote }}
          imagePullPolicy: {{ .Values.slackbot.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sDATABASE_URL" .Values.secretManager.envPrefix }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACK_BOT_TOKEN" .Values.secretManager.envPrefix }}
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACK_SIGNING_SECRET" .Values.secretManager.envPrefix }}
            - name: SLACKBOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACKBOT_API_KEY" .Values.secretManager.envPrefix }}
            - name: LMNR_PROJECT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sLMNR_PROJECT_API_KEY" .Values.secretManager.envPrefix }}
                  optional: true
            - name: LMNR_BASE_URL
{{- if .Values.laminar.enabled }}
              value: {{ include "centaur.laminarBaseUrl" . | quote }}
{{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sLMNR_BASE_URL" .Values.secretManager.envPrefix }}
                  optional: true
{{- end }}
            - name: LMNR_HTTP_PORT
              value: {{ .Values.laminar.appServer.service.httpPort | quote }}
            - name: LMNR_GRPC_PORT
              value: {{ .Values.laminar.appServer.service.grpcPort | quote }}
            - name: CENTAUR_API_URL
              value: {{ printf "http://%s:8000" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: HTTPS_PROXY
              value: {{ include "centaur.firewallProxyUrl" . | quote }}
            - name: NODE_EXTRA_CA_CERTS
              value: /firewall-certs/ca-cert.pem
            - name: NO_PROXY
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.firewallNoProxyHosts" .) (include "centaur.laminarNoProxyHosts" .) | quote }}
            - name: no_proxy
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.firewallNoProxyHosts" .) (include "centaur.laminarNoProxyHosts" .) | quote }}
{{- if .Values.slackbot.runtimeErrorAlertChannel }}
            - name: RUNTIME_ERROR_ALERT_CHANNEL
              value: {{ .Values.slackbot.runtimeErrorAlertChannel | quote }}
{{- end }}
{{- range $name, $value := .Values.slackbot.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
          volumeMounts:
            - name: firewall-ca
              mountPath: /firewall-certs
              readOnly: true
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.slackbot.resources | nindent 12 }}
      volumes:
        - name: firewall-ca
