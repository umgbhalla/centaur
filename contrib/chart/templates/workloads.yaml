{{- $reposPath := .Values.sandbox.reposPath -}}
{{- if and .Values.repoCache.enabled (not $reposPath) -}}
{{- $reposPath = .Values.repoCache.hostPath -}}
{{- end -}}
{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
{{- if .Values.postgres.auth.existingSecretName }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.auth.existingSecretName | quote }}
                  key: {{ .Values.postgres.auth.existingSecretKey | quote }}
{{- else }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.auth.password | quote }}
{{- end }}
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            tcpSocket:
              port: 5432
          livenessProbe:
            tcpSocket:
              port: 5432
          resources:
{{ toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "secrets") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "secrets") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "firewallCa" .Values.firewall.ca "database" .Values.database "postgresAuth" .Values.postgres.auth) | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: secrets
          image: {{ printf "%s:%s" .Values.secrets.image.repository .Values.secrets.image.tag | quote }}
          imagePullPolicy: {{ .Values.secrets.image.pullPolicy }}
          env:
            - name: SECRET_MANAGER_BACKEND
              value: {{ .Values.secretManager.backend | quote }}
            - name: SECRET_ENV_PREFIX
              value: {{ .Values.secretManager.envPrefix | quote }}
{{- range $name, $value := .Values.secrets.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- if or .Values.secrets.bootstrapSecretName .Values.secretManager.existingSecretName .Values.secretManager.generatedSecret.enabled }}
          envFrom:
            - secretRef:
{{- if .Values.secrets.bootstrapSecretName }}
                name: {{ .Values.secrets.bootstrapSecretName | quote }}
{{- else }}
                name: {{ include "centaur.secretEnvName" . }}
{{- end }}
{{- end }}
          ports:
            - containerPort: 8100
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "firewall") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "firewall") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "firewallCa" .Values.firewall.ca) | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: firewall-ca-bootstrap
          image: {{ printf "%s:%s" .Values.firewall.image.repository .Values.firewall.image.tag | quote }}
          imagePullPolicy: {{ .Values.firewall.image.pullPolicy }}
          env:
            - name: FIREWALL_CA_CERT
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CA_CERT" .Values.secretManager.envPrefix }}
            - name: FIREWALL_CA_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CA_KEY" .Values.secretManager.envPrefix }}
          command:
            - /bin/sh
            - -ec
            - |
              printf '%s\n%s\n' "$FIREWALL_CA_KEY" "$FIREWALL_CA_CERT" > /home/mitmproxy/.mitmproxy/mitmproxy-ca.pem
          volumeMounts:
            - name: firewall-mitmproxy-config
              mountPath: /home/mitmproxy/.mitmproxy
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
      containers:
        - name: firewall
          image: {{ printf "%s:%s" .Values.firewall.image.repository .Values.firewall.image.tag | quote }}
          imagePullPolicy: {{ .Values.firewall.image.pullPolicy }}
{{- $defaultTrustedInternalHosts := printf "%s,%s.%s.svc.cluster.local,api" (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "api")) .Release.Namespace }}
          env:
            - name: FIREWALL_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}
            - name: API_URL
              value: {{ printf "http://%s:8000" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: SECRET_MANAGER_URL
              value: {{ printf "http://%s:8100" (include "centaur.componentName" (dict "root" . "component" "secrets")) | quote }}
            - name: FIREWALL_TRUSTED_INTERNAL_HOSTS
              value: {{ if .Values.firewall.trustedInternalHosts }}{{ printf "%s,%s" $defaultTrustedInternalHosts .Values.firewall.trustedInternalHosts | quote }}{{ else }}{{ $defaultTrustedInternalHosts | quote }}{{ end }}
{{- range $name, $value := .Values.firewall.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - |
                    for _ in $(seq 1 30); do
                      if curl -fsS http://127.0.0.1:{{ .Values.firewall.service.controlPort }}/health >/dev/null; then
                        break
                      fi
                      sleep 1
                    done
                    if injection_map="$(curl -fsS http://{{ include "centaur.componentName" (dict "root" . "component" "api") }}:8000/internal/injection-map 2>/dev/null)"; then
                      curl -fsS \
                        -X POST \
                        -H "Authorization: Bearer ${FIREWALL_CONTROL_TOKEN}" \
                        -H 'Content-Type: application/json' \
                        --data "$injection_map" \
                        http://127.0.0.1:{{ .Values.firewall.service.controlPort }}/injection-map >/dev/null
                    fi
          ports:
            - containerPort: {{ .Values.firewall.service.proxyPort }}
              name: proxy
            - containerPort: {{ .Values.firewall.service.controlPort }}
              name: control
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.firewall.service.controlPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.firewall.service.controlPort }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: firewall-mitmproxy-config
              mountPath: /home/mitmproxy/.mitmproxy
              readOnly: false
      volumes:
        - name: firewall-mitmproxy-config
          emptyDir: {}
---
