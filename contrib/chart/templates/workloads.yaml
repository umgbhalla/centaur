{{- $reposPath := .Values.sandbox.reposPath -}}
{{- $apiExtraEnv := .Values.api.extraEnv | default dict -}}
{{- if and .Values.repoCache.enabled (not $reposPath) -}}
{{- $reposPath = .Values.repoCache.hostPath -}}
{{- end -}}
{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
{{- with .Values.postgres.args }}
          args:
{{ toYaml . | nindent 12 }}
{{- end }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
{{- if .Values.postgres.auth.existingSecretName }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "postgres.auth.existingSecretName is required when postgres.enabled=true" .Values.postgres.auth.existingSecretName | quote }}
                  key: {{ required "postgres.auth.existingSecretKey is required when postgres.enabled=true" .Values.postgres.auth.existingSecretKey | quote }}
{{- end }}
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            tcpSocket:
              port: 5432
          livenessProbe:
            tcpSocket:
              port: 5432
          resources:
{{ toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "secrets") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "secrets") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "firewallCa" .Values.firewall.ca "database" .Values.database "postgresAuth" .Values.postgres.auth) | sha256sum }}
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: secrets
          image: {{ printf "%s:%s" .Values.secrets.image.repository .Values.secrets.image.tag | quote }}
          imagePullPolicy: {{ .Values.secrets.image.pullPolicy }}
          env:
            - name: SECRET_MANAGER_BACKEND
              value: {{ .Values.secretManager.backend | quote }}
            - name: SECRET_ENV_PREFIX
              value: {{ .Values.secretManager.envPrefix | quote }}
            - name: SECRETS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSECRETS_AUTH_TOKEN" .Values.secretManager.envPrefix }}
{{- range $name, $value := .Values.secrets.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          envFrom:
            - secretRef:
{{- if .Values.secrets.bootstrapSecretName }}
                name: {{ .Values.secrets.bootstrapSecretName | quote }}
{{- else }}
                name: {{ include "centaur.secretEnvName" . }}
{{- end }}
          ports:
            - containerPort: 8100
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "iron-proxy") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "iron-proxy") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "ironProxy" .Values.ironProxy) | sha256sum }}
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: iron-proxy
          image: {{ printf "%s:%s" .Values.ironProxy.image.repository .Values.ironProxy.image.tag | quote }}
          imagePullPolicy: {{ .Values.ironProxy.image.pullPolicy }}
          env:
            - name: IRON_MANAGEMENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sIRON_MANAGEMENT_API_KEY" .Values.secretManager.envPrefix }}
{{- range $name, $value := .Values.ironProxy.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          envFrom:
            - secretRef:
                name: {{ include "centaur.secretEnvName" . }}
{{- if and (eq .Values.ironProxy.manager.secretSource "onepassword") .Values.secrets.bootstrapSecretName }}
            - secretRef:
                name: {{ .Values.secrets.bootstrapSecretName | quote }}
{{- end }}
          ports:
            - containerPort: {{ .Values.ironProxy.service.proxyPort }}
              name: proxy
            - containerPort: {{ .Values.ironProxy.service.managementPort }}
              name: management
            - containerPort: {{ .Values.ironProxy.service.healthPort }}
              name: health
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ironProxy.service.healthPort }}
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ironProxy.service.healthPort }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: iron-proxy-config
              mountPath: /etc/iron-proxy
            - name: iron-proxy-certs
              mountPath: /certs
            - name: iron-proxy-ca
              mountPath: /etc/iron-proxy-ca
              readOnly: true
        - name: firewall-manager
          image: {{ printf "%s:%s" .Values.ironProxy.manager.image.repository .Values.ironProxy.manager.image.tag | quote }}
          imagePullPolicy: {{ .Values.ironProxy.manager.image.pullPolicy }}
          env:
            - name: FIREWALL_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}
            - name: SECRETS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSECRETS_AUTH_TOKEN" .Values.secretManager.envPrefix }}
            - name: IRON_MANAGEMENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sIRON_MANAGEMENT_API_KEY" .Values.secretManager.envPrefix }}
            - name: SECRET_MANAGER_URL
              value: {{ printf "http://%s:8100" (include "centaur.componentName" (dict "root" . "component" "secrets")) | quote }}
            - name: IRON_PROXY_CONFIG_PATH
              value: /etc/iron-proxy/proxy.yaml
            - name: IRON_PROXY_MANAGEMENT_URL
              value: {{ printf "http://127.0.0.1:%v" .Values.ironProxy.service.managementPort | quote }}
            - name: FIREWALL_MANAGER_PORT
              value: {{ .Values.ironProxy.manager.service.controlPort | quote }}
            - name: FIREWALL_MANAGER_INJECTION_MAP_URL
              value: {{ printf "http://%s:8000/internal/injection-map" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: FIREWALL_MANAGER_POLL_INTERVAL_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.pollIntervalSeconds | quote }}
            - name: FIREWALL_MANAGER_POLL_JITTER_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.pollJitterSeconds | quote }}
            - name: FIREWALL_MANAGER_STARTUP_BACKOFF_INITIAL_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.startupBackoffInitialSeconds | quote }}
            - name: FIREWALL_MANAGER_STARTUP_BACKOFF_MAX_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.startupBackoffMaxSeconds | quote }}
            - name: FIREWALL_MANAGER_SECRET_SOURCE
              value: {{ .Values.ironProxy.manager.secretSource | quote }}
            - name: FIREWALL_MANAGER_SECRET_TTL
              value: {{ .Values.ironProxy.manager.secretTtl | quote }}
          envFrom:
            - secretRef:
                name: {{ include "centaur.secretEnvName" . }}
          ports:
            - containerPort: {{ .Values.ironProxy.manager.service.controlPort }}
              name: control
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.ironProxy.manager.service.controlPort }}
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ironProxy.manager.service.controlPort }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: iron-proxy-config
              mountPath: /etc/iron-proxy
      volumes:
        - name: iron-proxy-config
          emptyDir: {}
        - name: iron-proxy-certs
          emptyDir: {}
        - name: iron-proxy-ca
          secret:
            secretName: {{ include "centaur.trustedCaKeySecretName" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "pgbouncer") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "pgbouncer") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "database" .Values.database "postgresAuth" .Values.postgres.auth) | sha256sum }}
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgbouncer
          image: {{ printf "%s:%s" .Values.pgbouncer.image.repository .Values.pgbouncer.image.tag | quote }}
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "postgres.auth.existingSecretName is required" .Values.postgres.auth.existingSecretName | quote }}
                  key: {{ required "postgres.auth.existingSecretKey is required" .Values.postgres.auth.existingSecretKey | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_HOST
              value: {{ include "centaur.componentName" (dict "root" . "component" "postgres") | quote }}
            - name: AUTH_TYPE
              value: {{ .Values.pgbouncer.authType | quote }}
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.maxClientConn | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            tcpSocket:
              port: 5432
          livenessProbe:
            tcpSocket:
              port: 5432
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.pgbouncer.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "database" .Values.database "firewallCa" .Values.firewall.ca) | sha256sum }}
        checksum/firewall-ca: {{ toJson .Values.firewall.ca | sha256sum }}
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
        checksum/overlay: {{ toJson .Values.overlay | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      automountServiceAccountToken: true
      serviceAccountName: {{ include "centaur.apiServiceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.overlay.image.repository }}
      initContainers:
        - name: overlay-bootstrap
          image: {{ printf "%s:%s" .Values.overlay.image.repository .Values.overlay.image.tag | quote }}
          imagePullPolicy: {{ .Values.overlay.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              src={{ .Values.overlay.image.sourcePath | quote }}
              target={{ .Values.overlay.mountPath | quote }}
              mkdir -p "$target"
              cp -R "$src"/. "$target"/
          volumeMounts:
            - name: overlay-root
              mountPath: {{ dir .Values.overlay.mountPath | quote }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
{{- end }}
      containers:
        - name: api
          image: {{ printf "%s:%s" .Values.api.image.repository .Values.api.image.tag | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sDATABASE_URL" .Values.secretManager.envPrefix }}
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACK_SIGNING_SECRET" .Values.secretManager.envPrefix }}
            - name: SLACKBOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACKBOT_API_KEY" .Values.secretManager.envPrefix }}
            - name: SANDBOX_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSANDBOX_SIGNING_KEY" .Values.secretManager.envPrefix }}
            - name: FIREWALL_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}
            - name: SECRETS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSECRETS_AUTH_TOKEN" .Values.secretManager.envPrefix }}
            - name: SECRET_MANAGER_URL
              value: {{ include "centaur.secretManagerUrl" . | quote }}
            - name: FIREWALL_HEALTH_URL
              value: {{ include "centaur.firewallControlUrl" . | quote }}
            - name: HTTPS_PROXY
              value: {{ include "centaur.firewallProxyUrl" . | quote }}
            - name: REQUESTS_CA_BUNDLE
              value: /firewall-certs/ca-cert.pem
            - name: SSL_CERT_FILE
              value: /firewall-certs/ca-cert.pem
            - name: NO_PROXY
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s,%s,%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "pgbouncer")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "secrets")) (include "centaur.firewallNoProxyHosts" .) | quote }}
            - name: no_proxy
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s,%s,%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "pgbouncer")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "secrets")) (include "centaur.firewallNoProxyHosts" .) | quote }}
            - name: CENTAUR_LOG_LEVEL
              value: info
            - name: TOOL_DIRS
{{- if .Values.overlay.image.repository }}
              value: {{ printf "/app/tools:%s/tools" .Values.overlay.mountPath | quote }}
{{- else }}
              value: /app/tools
{{- end }}
            - name: WORKFLOW_DIRS
{{- if .Values.overlay.image.repository }}
              value: {{ printf "/app/workflows:%s/workflows" .Values.overlay.mountPath | quote }}
{{- else }}
              value: /app/workflows
{{- end }}
{{- if or .Values.overlay.systemPrompt .Values.overlay.image.repository }}
            - name: CENTAUR_OVERLAY_DIR
              value: {{ .Values.overlay.mountPath | quote }}
{{- end }}
{{- if .Values.overlay.image.repository }}
            - name: CENTAUR_OVERLAY_IMAGE
              value: {{ printf "%s:%s" .Values.overlay.image.repository .Values.overlay.image.tag | quote }}
            - name: CENTAUR_OVERLAY_IMAGE_PULL_POLICY
              value: {{ .Values.overlay.image.pullPolicy | quote }}
            - name: CENTAUR_OVERLAY_IMAGE_SOURCE_PATH
              value: {{ .Values.overlay.image.sourcePath | quote }}
{{- end }}
            - name: AGENT_API_URL
              value: {{ printf "http://%s:8000" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: FIREWALL_HOST
              value: {{ include "centaur.firewallProxyHost" . | quote }}
            - name: KUBERNETES_EGRESS_DISCOVERY_ENABLED
              value: {{ ternary "1" "0" .Values.api.egressDiscovery.enabled | quote }}
            - name: KUBERNETES_EGRESS_SERVICE_NAMESPACE
              value: {{ .Values.api.egressDiscovery.namespace | quote }}
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ .Values.api.egressDiscovery.clusterDomain | quote }}
            - name: KUBERNETES_EGRESS_TAILNET_FQDN_ANNOTATION
              value: {{ .Values.api.egressDiscovery.tailnetFqdnAnnotation | quote }}
            - name: EXECUTION_WORKER_ENABLED
              value: {{ ternary "1" "0" .Values.api.executionWorkerEnabled | quote }}
            - name: WORKFLOW_WORKER_ENABLED
              value: {{ ternary "1" "0" .Values.api.workflowWorkerEnabled | quote }}
            - name: WARM_POOL_ENABLED
              value: {{ ternary "1" "0" .Values.api.warmPoolEnabled | quote }}
{{- if not (hasKey $apiExtraEnv "SLACK_ETL_ENABLED") }}
            - name: SLACK_ETL_ENABLED
              value: {{ ternary "1" "0" .Values.api.slackEtlEnabled | quote }}
{{- end }}
{{- if not (hasKey $apiExtraEnv "SLACK_SYNC_INTERVAL_SECONDS") }}
            - name: SLACK_SYNC_INTERVAL_SECONDS
              value: {{ .Values.api.slackSyncIntervalSeconds | quote }}
{{- end }}
            - name: AGENT_IMAGE
              value: {{ printf "%s:%s" .Values.sandbox.image.repository .Values.sandbox.image.tag | quote }}
            - name: KUBERNETES_AGENT_IMAGE_PULL_POLICY
              value: {{ .Values.sandbox.image.pullPolicy | quote }}
            - name: KUBERNETES_FIREWALL_CA_SECRET_NAME
              value: {{ include "centaur.trustedCaSecretName" . | quote }}
            - name: KUBERNETES_FIREWALL_CA_KEY_SECRET_NAME
              value: {{ include "centaur.trustedCaKeySecretName" . | quote }}
            - name: KUBERNETES_SECRET_ENV_NAME
              value: {{ include "centaur.secretEnvName" . | quote }}
            - name: KUBERNETES_SECRET_ENV_PREFIX
              value: {{ .Values.secretManager.envPrefix | quote }}
            - name: KUBERNETES_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: KUBERNETES_IRON_PROXY_IMAGE
              value: {{ printf "%s:%s" .Values.ironProxy.image.repository .Values.ironProxy.image.tag | quote }}
            - name: KUBERNETES_IRON_PROXY_IMAGE_PULL_POLICY
              value: {{ .Values.ironProxy.image.pullPolicy | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_IMAGE
              value: {{ printf "%s:%s" .Values.ironProxy.manager.image.repository .Values.ironProxy.manager.image.tag | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_IMAGE_PULL_POLICY
              value: {{ .Values.ironProxy.manager.image.pullPolicy | quote }}
            - name: KUBERNETES_IRON_PROXY_PORT
              value: {{ .Values.ironProxy.service.proxyPort | quote }}
            - name: KUBERNETES_IRON_PROXY_MANAGEMENT_PORT
              value: {{ .Values.ironProxy.service.managementPort | quote }}
            - name: KUBERNETES_IRON_PROXY_HEALTH_PORT
              value: {{ .Values.ironProxy.service.healthPort | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_PORT
              value: {{ .Values.ironProxy.manager.service.controlPort | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_POLL_INTERVAL_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.pollIntervalSeconds | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_POLL_JITTER_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.pollJitterSeconds | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_STARTUP_BACKOFF_INITIAL_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.startupBackoffInitialSeconds | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_STARTUP_BACKOFF_MAX_SECONDS
              value: {{ .Values.sandbox.perWorkloadProxy.startupBackoffMaxSeconds | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_SECRET_SOURCE
              value: {{ .Values.ironProxy.manager.secretSource | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_SECRET_TTL
              value: {{ .Values.ironProxy.manager.secretTtl | quote }}
            - name: KUBERNETES_FIREWALL_MANAGER_INJECTION_MAP_URL
              value: {{ printf "http://%s:8000/internal/injection-map" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: KUBERNETES_API_POD_LABEL_SELECTOR
              value: {{ printf "app.kubernetes.io/name=%s,app.kubernetes.io/instance=%s,app.kubernetes.io/component=api" (include "centaur.name" .) .Release.Name | quote }}
            - name: KUBERNETES_SECRETS_POD_LABEL_SELECTOR
              value: {{ printf "app.kubernetes.io/name=%s,app.kubernetes.io/instance=%s,app.kubernetes.io/component=secrets" (include "centaur.name" .) .Release.Name | quote }}
{{- with .Values.sandbox.resources.limits }}
{{- if and .cpu (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_CPU_LIMIT")) }}
            - name: KUBERNETES_SANDBOX_CPU_LIMIT
              value: {{ .cpu | quote }}
{{- end }}
{{- if and .memory (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_MEMORY_LIMIT")) }}
            - name: KUBERNETES_SANDBOX_MEMORY_LIMIT
              value: {{ .memory | quote }}
{{- end }}
{{- end }}
{{- with .Values.sandbox.resources.requests }}
{{- if and .cpu (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_CPU_REQUEST")) }}
            - name: KUBERNETES_SANDBOX_CPU_REQUEST
              value: {{ .cpu | quote }}
{{- end }}
{{- if and .memory (not (hasKey $apiExtraEnv "KUBERNETES_SANDBOX_MEMORY_REQUEST")) }}
            - name: KUBERNETES_SANDBOX_MEMORY_REQUEST
              value: {{ .memory | quote }}
{{- end }}
{{- end }}
{{- if .Values.sandbox.runtimeClassName }}
            - name: KUBERNETES_SANDBOX_RUNTIME_CLASS_NAME
              value: {{ .Values.sandbox.runtimeClassName | quote }}
{{- end }}
{{- if $reposPath }}
            - name: REPOS_PATH
              value: {{ $reposPath | quote }}
{{- end }}
{{- with .Values.sandbox.extraEnv }}
{{- $envList := list }}
{{- range $k, $v := . }}
{{- $envList = append $envList (dict "name" $k "value" ($v | toString)) }}
{{- end }}
            - name: KUBERNETES_SANDBOX_EXTRA_ENV
              value: {{ $envList | toJson | quote }}
{{- end }}
{{- if .Values.global.imagePullSecrets }}
            - name: KUBERNETES_SANDBOX_IMAGE_PULL_SECRETS
              value: "{{- range $index, $secret := .Values.global.imagePullSecrets }}{{- if $index }},{{ end -}}{{ $secret.name }}{{- end }}"
{{- end }}
            - name: VICTORIAMETRICS_PUSH_ENABLED
              value: {{ ternary "1" "0" .Values.api.victoriaMetricsPushEnabled | quote }}
{{- if .Values.slackbot.enabled }}
            - name: SLACKBOT_URL
              value: {{ printf "http://%s:3001" (include "centaur.componentName" (dict "root" . "component" "slackbot")) | quote }}
{{- end }}
{{- range $name, $value := .Values.api.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: {{ .Values.api.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.startupProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
          volumeMounts:
            - name: firewall-ca
              mountPath: /firewall-certs
              readOnly: true
{{- if .Values.overlay.image.repository }}
            - name: overlay-root
              mountPath: {{ dir .Values.overlay.mountPath | quote }}
              readOnly: true
{{- else if .Values.overlay.systemPrompt }}
            - name: overlay
              mountPath: {{ .Values.overlay.mountPath | quote }}
              readOnly: true
{{- end }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: firewall-ca
          secret:
            secretName: {{ include "centaur.trustedCaSecretName" . }}
{{- if .Values.overlay.image.repository }}
        - name: overlay-root
          emptyDir: {}
{{- else if .Values.overlay.systemPrompt }}
        - name: overlay
          configMap:
            name: {{ include "centaur.componentName" (dict "root" . "component" "overlay") }}
            items:
              - key: SYSTEM_PROMPT.md
                path: services/sandbox/SYSTEM_PROMPT.md
{{- end }}
---
{{- if .Values.slackbot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
spec:
  replicas: {{ .Values.slackbot.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "database" .Values.database "firewallCa" .Values.firewall.ca) | sha256sum }}
        checksum/firewall-ca: {{ toJson .Values.firewall.ca | sha256sum }}
        checksum/infra-secrets: {{ include "centaur.infraSecretsChecksum" . }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: slackbot
          image: {{ printf "%s:%s" .Values.slackbot.image.repository .Values.slackbot.image.tag | quote }}
          imagePullPolicy: {{ .Values.slackbot.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sDATABASE_URL" .Values.secretManager.envPrefix }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACK_BOT_TOKEN" .Values.secretManager.envPrefix }}
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACK_SIGNING_SECRET" .Values.secretManager.envPrefix }}
            - name: SLACKBOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSLACKBOT_API_KEY" .Values.secretManager.envPrefix }}
            - name: SECRETS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sSECRETS_AUTH_TOKEN" .Values.secretManager.envPrefix }}
            - name: CENTAUR_API_URL
              value: {{ printf "http://%s:8000" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: SECRET_MANAGER_URL
              value: {{ include "centaur.secretManagerUrl" . | quote }}
            - name: HTTPS_PROXY
              value: {{ include "centaur.firewallProxyUrl" . | quote }}
            - name: NODE_EXTRA_CA_CERTS
              value: /firewall-certs/ca-cert.pem
            - name: NO_PROXY
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s,%s,%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "pgbouncer")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "secrets")) (include "centaur.firewallNoProxyHosts" .) | quote }}
            - name: no_proxy
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s,%s,%s,centaur-egress.svc.cluster.local,.centaur-egress.svc.cluster.local" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "pgbouncer")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "secrets")) (include "centaur.firewallNoProxyHosts" .) | quote }}
{{- if .Values.slackbot.runtimeErrorAlertChannel }}
            - name: RUNTIME_ERROR_ALERT_CHANNEL
              value: {{ .Values.slackbot.runtimeErrorAlertChannel | quote }}
{{- end }}
{{- range $name, $value := .Values.slackbot.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
          volumeMounts:
            - name: firewall-ca
              mountPath: /firewall-certs
              readOnly: true
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.slackbot.resources | nindent 12 }}
      volumes:
        - name: firewall-ca
          secret:
            secretName: {{ include "centaur.trustedCaSecretName" . }}
{{- end }}
