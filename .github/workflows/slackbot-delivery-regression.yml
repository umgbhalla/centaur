name: Slackbot Delivery Regression

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/slackbot-delivery-regression.yml
      - services/slackbot/**
      - packages/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - package.json

concurrency:
  group: slackbot-delivery-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  overflow-duplicate-regression:
    name: Slack stream overflow duplicate regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Slackbot delivery regression suite
        run: pnpm run slackbot:delivery-regression
