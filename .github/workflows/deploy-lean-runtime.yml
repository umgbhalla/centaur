name: Deploy Lean Runtime

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: snappy-storm-496900-m0
  PROJECT_NUMBER: "442243473495"
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: centaur
  CLUSTER_NAME: lean-centaur-west1
  CLUSTER_ZONE: us-west1-a
  NAMESPACE: centaur
  API_DEPLOYMENT: centaur-centaur-api
  WORKLOAD_IDENTITY_PROVIDER: projects/442243473495/locations/global/workloadIdentityPools/github-actions/providers/lean-centaur-overlay
  SERVICE_ACCOUNT: centaur-overlay-deployer@snappy-storm-496900-m0.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push runtime images
        run: |
          tag="runtime-${GITHUB_SHA::8}-amd64-$(date -u +%Y%m%d)"
          registry="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}"
          api_image="${registry}/centaur-api:${tag}"
          agent_image="${registry}/centaur-agent:${tag}"

          gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet
          docker build --platform linux/amd64 -f services/api/Dockerfile -t "${api_image}" .
          docker build --platform linux/amd64 -f services/sandbox/Dockerfile --target sandbox -t "${agent_image}" .
          docker push "${api_image}"
          docker push "${agent_image}"

          echo "runtime_tag=${tag}" >> "${GITHUB_ENV}"
          echo "api_image=${api_image}" >> "${GITHUB_ENV}"
          echo "agent_image=${agent_image}" >> "${GITHUB_ENV}"

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_ZONE }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy runtime images
        run: |
          kubectl -n "${NAMESPACE}" set image "deployment/${API_DEPLOYMENT}" \
            "api=${api_image}"
          kubectl -n "${NAMESPACE}" set env "deployment/${API_DEPLOYMENT}" \
            "AGENT_IMAGE=${agent_image}" \
            "KUBERNETES_AGENT_IMAGE_PULL_POLICY=IfNotPresent"
          kubectl -n "${NAMESPACE}" rollout status "deployment/${API_DEPLOYMENT}" --timeout=300s

      - name: Summary
        run: |
          echo "deployed ${runtime_tag}" >> "${GITHUB_STEP_SUMMARY}"
          echo "api: ${api_image}" >> "${GITHUB_STEP_SUMMARY}"
          echo "agent: ${agent_image}" >> "${GITHUB_STEP_SUMMARY}"
