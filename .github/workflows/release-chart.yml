name: Release Chart

"on":
  push:
    branches:
      - main
    paths:
      - "contrib/chart/**"
      - ".github/workflows/release-chart.yml"

permissions: {}

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Bootstrap gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists"
          else
            echo "Creating empty gh-pages branch"
            git switch --orphan gh-pages
            git commit --allow-empty -m "chore: initialize gh-pages"
            git push origin gh-pages
            git switch -
          fi

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v4.1.1

      - name: Lint chart
        run: helm lint contrib/chart

      - name: Install yq
        uses: mikefarah/yq@5a7e72a743649b1b3a47d1a1d8214f3453173c51 # v4

      - name: Auto-bump patch version if needed
        id: bump
        run: |
          set -e

          CHART_YAML="contrib/chart/Chart.yaml"

          # Determine if contrib/chart/** changed in this push
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if ! echo "$CHANGED_FILES" | grep -q "^contrib/chart/"; then
            echo "No chart changes detected"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_VERSION=$(yq '.version' "$CHART_YAML")
          PREVIOUS_VERSION=$(git show HEAD~1:"$CHART_YAML" 2>/dev/null | yq '.version' 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version already bumped ($PREVIOUS_VERSION -> $CURRENT_VERSION)"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d'.' -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d'.' -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d'.' -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          echo "Bumping centaur chart: $CURRENT_VERSION -> $NEW_VERSION"
          yq -i ".version = \"$NEW_VERSION\"" "$CHART_YAML"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git add contrib/chart/Chart.yaml
          git commit -m "chore: auto-bump chart version [skip ci]"
          git push

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_existing: true
          charts_dir: contrib
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
