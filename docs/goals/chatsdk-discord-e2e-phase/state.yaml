    verify:
      - "Generate ephemeral Ed25519 test signing key."
      - "Configure local Slackbot with DISCORD_PUBLIC_KEY."
      - "POST signed PING and application command interaction to /api/webhooks/discord."
      - "Verify PING returns PONG and command returns deferred response with workflow handoff."
    receipt:
      result: done
      summary: "Signed Discord ingress works on the deployed Slackbot pod and creates a Centaur workflow. Full assistant result delivery is blocked by the same local Kubernetes API connectivity failure as T004."
      changed_files:
