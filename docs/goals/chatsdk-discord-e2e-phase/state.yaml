# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Chat SDK Discord End To End Phase"
  slug: "chatsdk-discord-e2e-phase"
  kind: specific
  tranche: "Prove the phase-1 Chat SDK-shaped Discord path on the local Centaur stack."
  status: active
  oracle:
    signal: "Local runtime receipts prove build, deploy, API workflow execution, and Discord webhook handoff, or record exact local prerequisite blockers."
    cadence: "after each runtime proof step"
    final_proof: "Receipts map each E2E hop to pass/blocker with commands."
  intake:
    original_request: "End-to-end full phase goal and proceed for Chat SDK/Discord migration."
    interpreted_outcome: "Centaur's new generic chat workflow and Discord ingress are proven through the local stack rather than only unit tests."
    input_shape: specific
    audience: "Centaur maintainers and operators"
    authority: requested
    proof_type: runtime
    completion_proof: "Local cluster status, build/deploy output, in-cluster workflow request, Discord webhook request, and final audit receipt."
    likely_misfire: "Calling phase-1 unit tests an E2E pass or using a remote production-like cluster for validation."
    blind_spots_considered:
      - "The selected kube context can be remote."
      - "Local Colima/OrbStack Kubernetes may be stopped."
      - "Discord final delivery needs either real credentials or a local fake Discord API endpoint."
      - "The repo requires local-first testing before push."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    prefer_vertical_slices: true
    worker_completes_whole_slice: true

agents:
  scout: missing
  worker: missing
  judge: missing

visual_board:
  selected: local
  local:
    status: pending
    url: ""
    command: "npx goalbuddy board docs/goals/chatsdk-discord-e2e-phase"

active_task: T007

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Inventory local cluster, context, and secret readiness without touching deploy-box paths."
    receipt:
      result: done
      summary: "Current context is do-blr1-msbx-stag-cluster and kubectl cannot authenticate through doctl. Local colima and orbstack contexts exist but both local API ports refused connections. Required bootstrap environment variables were absent in the shell."
      evidence:
        - "just status returned doctl authentication failure for the remote context."
        - "kubectl --context colima and --context orbstack initially refused connections."
        - "Required OP, Slack, and Discord environment variables were missing from the shell."
      commands:
        - cmd: "just status"
          status: fail
          output: "Unable to authenticate to do-blr1-msbx-stag-cluster through doctl."
        - cmd: "kubectl --context colima get nodes"
          status: fail
          output: "connect: connection refused"
        - cmd: "kubectl --context orbstack get nodes"
          status: fail
          output: "connect: connection refused"
        - cmd: "printenv OP_SERVICE_ACCOUNT_TOKEN OP_VAULT SLACK_BOT_TOKEN SLACK_SIGNING_SECRET SLACKBOT_API_KEY DISCORD_PUBLIC_KEY DISCORD_BOT_TOKEN"
          status: fail
          output: "All required infra/chat secrets missing from shell."
  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Start or select a local Kubernetes context for Centaur E2E without mutating or using the remote DigitalOcean context."
    allowed_files:
      - "docs/goals/chatsdk-discord-e2e-phase/state.yaml"
    verify:
      - "kubectl --context colima get nodes"
      - "kubectl --context orbstack get nodes"
      - "Use explicit --context for any kubectl/helm E2E command."
    stop_if:
      - "Local Kubernetes cannot be started safely."
      - "Starting local Kubernetes requires user-provided credentials or destructive state changes."
    receipt:
      result: done
      summary: "Started Colima with Kubernetes. Local colima context is Ready and Docker is available from the Colima runtime."
      changed_files:
        - "docs/goals/chatsdk-discord-e2e-phase/state.yaml"
      commands:
        - cmd: "colima start --kubernetes"
          status: pass
        - cmd: "kubectl --context colima get nodes -o wide"
          status: pass
          output: "colima Ready control-plane,master v1.33.4+k3s1 docker://28.4.0"
        - cmd: "docker info --format '{{json .ServerVersion}} {{json .OperatingSystem}}'"
          status: pass
          output: "28.4.0 Ubuntu 24.04.2 LTS"
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Build affected service images and deploy Centaur to the selected local context."
    allowed_files:
      - "docs/goals/chatsdk-discord-e2e-phase/state.yaml"
      - "services/api/api/api_keys.py"
      - "services/api/tests/test_chat_sdk.py"
    verify:
      - "just build-one api"
      - "just build-one slackbot"
      - "helm upgrade --install centaur contrib/chart -n centaur --create-namespace -f contrib/chart/values.dev.yaml --kube-context <local>"
    receipt:
      result: done
      summary: "Built all required local images inside Colima, bootstrapped local placeholder secrets plus an ephemeral Discord public key, deployed Helm to Colima with local image pull policies, and rolled out API plus Slackbot."
      changed_files:
        - "docs/goals/chatsdk-discord-e2e-phase/state.yaml"
        - "services/api/api/api_keys.py"
        - "services/api/tests/test_chat_sdk.py"
      commands:
        - cmd: "colima ssh -- DOCKER_BUILDKIT=1 docker build -t centaur-api:latest -f services/api/Dockerfile ."
          status: pass
        - cmd: "colima ssh -- DOCKER_BUILDKIT=0 docker build -t centaur-slackbot:latest -f services/slackbot/Dockerfile ."
          status: pass
        - cmd: "colima ssh -- DOCKER_BUILDKIT=1 docker build -t centaur-iron-proxy:latest -f services/iron-proxy/Dockerfile ."
          status: pass
        - cmd: "colima ssh -- DOCKER_BUILDKIT=1 docker build --target sandbox -t centaur-agent:latest -f services/sandbox/Dockerfile ."
          status: pass
        - cmd: "contrib/scripts/bootstrap-k8s-secrets.sh --namespace centaur --force"
          status: pass
          output: "Created centaur-infra-env, centaur-firewall-ca, and centaur-firewall-ca-key in local namespace centaur using local-only placeholder values."
        - cmd: "helm upgrade --install centaur contrib/chart --kube-context colima -n centaur --create-namespace -f contrib/chart/values.dev.yaml --set api.image.pullPolicy=IfNotPresent --set slackbot.image.pullPolicy=IfNotPresent --set ironProxy.image.pullPolicy=IfNotPresent --set sandbox.image.pullPolicy=IfNotPresent --set ironProxy.manager.pullPolicy=IfNotPresent"
          status: pass
        - cmd: "kubectl --context colima -n centaur rollout status deploy/centaur-centaur-api deploy/centaur-centaur-slackbot"
          status: pass
  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run an in-cluster chat_thread_turn workflow with Discord platform input and dev delivery."
    allowed_files:
      - "docs/goals/chatsdk-discord-e2e-phase/state.yaml"
    verify:
      - "kubectl --context <local> exec -n centaur deploy/centaur-centaur-api -- curl -s -X POST http://localhost:8000/workflows/runs ..."
      - "Poll workflow/execution terminal state and verify assistant result."
    receipt:
      result: done
      summary: "The in-cluster API accepted the Discord-shaped chat_thread_turn workflow request, but the run failed before sandbox execution because the API pod could not connect to the Kubernetes API service IP."
      changed_files:
        - "docs/goals/chatsdk-discord-e2e-phase/state.yaml"
      commands:
        - cmd: "colima ssh -- kubectl exec -n centaur deploy/centaur-centaur-api -- curl -X POST http://localhost:8000/workflows/runs ..."
          status: pass
          output: "Created wfr_91da5356c9524ada for thread_key discord:e2e:guild-local:channel-local:1779445116."
        - cmd: "GET /workflows/runs/wfr_91da5356c9524ada"
          status: pass
          output: "status=failed error_text=Cannot connect to host 10.43.0.1:443 ssl:default [Connect call failed ('10.43.0.1', 443)]"
        - cmd: "kubectl exec deploy/centaur-centaur-api -- python socket connect 10.43.0.1:443"
          status: pass
          output: "ConnectionRefusedError(111, 'Connection refused')"
  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run a signed Discord interaction request through the Slackbot Discord route and verify Centaur handoff."
    allowed_files:
