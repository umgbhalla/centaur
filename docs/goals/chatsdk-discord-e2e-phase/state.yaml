      - "Repair requires real production credentials or the DigitalOcean context."
    receipt:
      result: partial
      summary: "Local runtime bypasses are now in place: API can connect to the Kubernetes apiserver, the Discord emulator can send signed interactions to Slackbot, and chat_thread_turn reaches sandbox execution. The remaining gap is a clean Discord final message because the codex harness produced an empty result after a reconnect warning."
