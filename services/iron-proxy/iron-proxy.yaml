dns:
  listen: ":53"
  proxy_ip: "127.0.0.1"

proxy:
  tunnel_listen: ":8080"

management:
  listen: ":9092"
  api_key_env: "IRON_MANAGEMENT_API_KEY"

tls:
  mode: "mitm"
  ca_cert: "/etc/iron-proxy/ca.crt"
  ca_key: "/etc/iron-proxy/ca.key"

transforms:
  - name: allowlist
    config:
      domains:
        - "*"
  - name: header_allowlist
    config:
      headers:
        - "host"
        - "content-type"
        - "content-length"
        - "accept"
        - "accept-encoding"
        - "accept-language"
        - "authorization"
        - "x-api-key"
        - "x-browser-use-api-key"
        - "anthropic-version"
        - "anthropic-beta"
        - "openai-organization"
        - "openai-project"
        - "x-request-id"
        - "x-stainless-arch"
        - "x-stainless-os"
        - "x-stainless-lang"
        - "x-stainless-runtime"
        - "x-stainless-runtime-version"
        - "x-stainless-package-version"
        - "x-stainless-retry-count"
        - "connection"
        - "transfer-encoding"
        - "te"
        - "upgrade"
        - "origin"
        - "sec-websocket-key"
        - "sec-websocket-version"
        - "sec-websocket-protocol"
        - "sec-websocket-extensions"
        - "cache-control"
        - "pragma"
        - "if-none-match"
        - "if-modified-since"
        - "range"
        - "cookie"
        - "notion-version"
        - "jwt"
        - "api-version"

log:
  level: "info"
