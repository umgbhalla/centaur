upstream api {
    server api:8000;
}

upstream slackbot {
    server slackbot:3001;
}

upstream web {
    server web:3001;
}

upstream grafana {
    server grafana:3000;
}

upstream auth {
    server auth:4000;
}

server {
    listen 8000;
    client_max_body_size 10m;

    # Behind Cloudflare Tunnel — don't include internal port/scheme in redirects
    absolute_redirect off;

    # Security: hide nginx version
    server_tokens off;

    # Response compression
    gzip on;
    gzip_types text/plain application/json text/css application/javascript text/xml application/xml;
    gzip_min_length 256;
    gzip_vary on;

    # ----- Auth service -----
    location /login {
        proxy_pass http://auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout {
        proxy_pass http://auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal subrequest — nginx auth_request delegates here
    location = /auth/check {
        internal;
        proxy_pass http://auth/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }

    # ----- Grafana (cookie auth required, proxy auth header) -----
    location /grafana/ {
        auth_request /auth/check;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        error_page 401 = @login_redirect;

        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User $auth_user;
    }

    location /grafana/api/live/ {
        auth_request /auth/check;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        error_page 401 = @login_redirect;

        proxy_pass http://grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-User $auth_user;
    }

    # ----- FastAPI API routes -----
    # SECURITY: every location proxying to FastAPI MUST set
    #   proxy_set_header X-Forwarded-User "";
    # to prevent clients from spoofing the header.
    # Only auth_request locations may set it to $auth_user.

    # Slack webhooks — routed directly to slackbot (HMAC verified there)
    location /api/slack/events {
        proxy_pass http://slackbot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location = /api/webhooks/slack {
        rewrite ^ /api/slack/events break;
        proxy_pass http://slackbot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    # ----- Browser-facing API (thread viewer, cookie auth required) -----
    location /api/threads {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
        # SSE support for stream-ui
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /api/messages {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /api/agent/ {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
        # SSE support for agent execute stream
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /api/slack/ {
        auth_request /auth/check;
        error_page 401 = @login_redirect;

        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /api/query {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /api/search {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /api/secrets {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /api/sync {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /mcp {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /health {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-User "";
    }

    location /admin {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /agent/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
        # SSE support for agent execute/reconnect streams
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Trailing slash is critical — without it, `/slack` prefix-matches thread
    # detail URLs like `/slack:C0AJ07U8Z1N:...` and routes them here instead
    # of to the slackbot's Next.js catch-all at `location /`.
    location /slack/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /tools {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    location /workflows {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User "";
    }

    # ----- Next.js static assets (no auth) -----
    location /_next {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-User "";
    }

    # ----- Thread viewer UI (auth required) -----
    location / {
        auth_request /auth/check;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        error_page 401 = @login_redirect;

        proxy_set_header X-Forwarded-User $auth_user;
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @login_redirect {
        return 302 /login;
    }
}
