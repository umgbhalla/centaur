<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centaur Tool Dashboard</title>
  <base href="/apps/usage/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="centaur.png">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <nav>
    <div class="nav-left">
      <span class="logo">Centaur Usage <img src="centaur.png" class="logo-icon" alt=""></span>
    </div>
    <div class="nav-right">
      <div class="radio-group window-toggle">
        <label class="radio-pill"><input type="radio" name="window" value="all"> All</label>
        <label class="radio-pill active"><input type="radio" name="window" value="7d" checked> 7D</label>
        <label class="radio-pill"><input type="radio" name="window" value="1d"> 1D</label>
      </div>
      <div class="radio-group view-toggle">
        <label class="radio-pill active">
          <input type="radio" name="view" value="tools" checked> Tools
        </label>
        <label class="radio-pill">
          <input type="radio" name="view" value="skills"> Skills
        </label>
        <label class="radio-pill">
          <input type="radio" name="view" value="workflows"> Workflows
        </label>
        <label class="radio-pill">
          <input type="radio" name="view" value="apps"> Apps
        </label>
        <label class="radio-pill">
          <input type="radio" name="view" value="teams"> Teams
        </label>
        <label class="radio-pill">
          <input type="radio" name="view" value="users"> Users
        </label>
      </div>
    </div>
  </nav>

  <main>
    <div class="table-info">
      <span id="row-count"></span>
    </div>

    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>

  <script src="app.js?v=13"></script>
</body>
</html>
